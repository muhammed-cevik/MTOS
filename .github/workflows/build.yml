name: MT OS Build & Release

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build MT OS
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Bağımlılıklar ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc \
            python3 \
            lua5.4 \
            dosfstools \
            mtools \
            zip \
            tree
          python3 --version
          lua5.4 -v
          gcc --version | head -1

      # ─── Python Syntax Kontrolü ────────────────────────────────────────────
      - name: Check Python syntax
        run: |
          echo "── Python syntax check ──"
          python3 -m py_compile shell/shell.py
          python3 -m py_compile games/guess.py
          python3 -m py_compile games/snake.py
          python3 -m py_compile games/maze.py
          echo "✓ Tüm Python dosyaları geçerli"

      # ─── Lua Syntax Kontrolü ──────────────────────────────────────────────
      - name: Check Lua syntax
        run: |
          echo "── Lua syntax check ──"
          lua5.4 -e "loadfile('lua/game.lua')" && echo "✓ game.lua geçerli"
          lua5.4 -e "loadfile('lua/hello.lua')" && echo "✓ hello.lua geçerli"

      # ─── C Kernel Derleme ─────────────────────────────────────────────────
      - name: Compile C Kernel
        run: |
          echo "── C Kernel build ──"
          gcc -o build_kernel kernel/kernel.c -Wall -O2
          echo "✓ Kernel derlendi: $(ls -lh build_kernel)"

      # ─── IMG + ZIP Build ──────────────────────────────────────────────────
      - name: Build IMG and ZIP
        run: |
          echo "── Full build ──"
          chmod +x scripts/build.sh
          bash scripts/build.sh
          echo "── Dist içeriği ──"
          tree dist/ || ls -lh dist/

      # ─── Artifacts Upload ─────────────────────────────────────────────────
      - name: Upload IMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtos-img
          path: dist/mtos.img
          retention-days: 30

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtos-release-zip
          path: dist/MTOS-release.zip
          retention-days: 30

      - name: Upload build folder
        uses: actions/upload-artifact@v4
        with:
          name: mtos-build
          path: build/
          retention-days: 7

  # ─── Release (sadece tag push'ta) ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download IMG
        uses: actions/download-artifact@v4
        with:
          name: mtos-img
          path: ./release-files/

      - name: Download ZIP
        uses: actions/download-artifact@v4
        with:
          name: mtos-release-zip
          path: ./release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MT OS ${{ github.ref_name }}"
          body: |
            ## 🖥️ MT OS ${{ github.ref_name }}

            Python + C + Lua tabanlı mini terminal işletim sistemi.

            ### 📦 İndirilenler
            | Dosya | Açıklama |
            |-------|----------|
            | `mtos.img` | Disk imajı (32MB FAT32) |
            | `MTOS-release.zip` | Tüm kaynak + binary |

            ### 🚀 Hızlı Başlangıç
            ```bash
            unzip MTOS-release.zip
            bash run.sh
            ```

            ### 💻 QEMU ile çalıştır
            ```bash
            qemu-system-x86_64 -drive format=raw,file=mtos.img -m 256M
            ```

            ### 🎮 Komutlar
            `ls` `cd` `mkdir` `rm` `writef` `edfile` `cat` `lua` `games` `help`
          files: |
            ./release-files/mtos.img
            ./release-files/MTOS-release.zip
          draft: false
          prerelease: false
