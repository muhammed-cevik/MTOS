name: MT OS Build & Release

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build MT OS (Normal + Limbo)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc python3 lua5.4 \
            busybox-static \
            linux-image-generic \
            dosfstools mtools \
            syslinux syslinux-common extlinux \
            cpio gzip zip tree
          python3 --version
          lua5.4 -v
          ls /boot/vmlinuz-* | tail -1

      - name: Check Python syntax
        run: |
          python3 -m py_compile shell/shell.py
          python3 -m py_compile games/guess.py
          python3 -m py_compile games/snake.py
          python3 -m py_compile games/maze.py
          echo "✓ Python syntax OK"

      - name: Check Lua syntax
        run: |
          lua5.4 -e "loadfile('lua/game.lua')" && echo "✓ game.lua OK"
          lua5.4 -e "loadfile('lua/hello.lua')" && echo "✓ hello.lua OK"

      - name: Compile C Kernel
        run: |
          mkdir -p build
          gcc -o build/mtos_kernel kernel/kernel.c -Wall -O2
          echo "✓ C kernel: $(ls -lh build/mtos_kernel)"

      - name: Build Normal IMG + ZIP
        run: |
          chmod +x scripts/build.sh
          bash scripts/build.sh

      - name: Build Limbo/QEMU IMG
        run: |
          chmod +x scripts/build_limbo.sh
          sudo bash scripts/build_limbo.sh

      - name: Show dist
        run: |
          echo "── dist/ içeriği ──"
          tree dist/ || ls -lh dist/

      - name: Upload normal IMG
        uses: actions/upload-artifact@v4
        with:
          name: mtos-img
          path: dist/mtos.img
          retention-days: 30

      - name: Upload Limbo IMG
        uses: actions/upload-artifact@v4
        with:
          name: mtos-limbo-img
          path: dist/mtos-limbo.img
          retention-days: 30

      - name: Upload bzImage
        uses: actions/upload-artifact@v4
        with:
          name: mtos-bzImage
          path: dist/bzImage
          retention-days: 30

      - name: Upload initrd
        uses: actions/upload-artifact@v4
        with:
          name: mtos-initrd
          path: dist/initrd.img
          retention-days: 30

      - name: Upload Limbo ZIP
        uses: actions/upload-artifact@v4
        with:
          name: mtos-limbo-zip
          path: dist/MTOS-Limbo.zip
          retention-days: 30

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-files/

      - name: List files
        run: find ./release-files -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MT OS ${{ github.ref_name }}"
          body: |
            ## 🖥️ MT OS ${{ github.ref_name }}

            Python + C + Lua tabanlı mini terminal işletim sistemi.

            ### 📦 İndirilenler

            | Dosya | Açıklama |
            |-------|----------|
            | `MTOS-Limbo.zip` | 📱 **Limbo PC için hazır paket** |
            | `mtos-limbo.img` | Limbo disk imajı (128MB) |
            | `bzImage` | Linux kernel |
            | `initrd.img` | Initramfs (Python + Lua + MT OS) |
            | `mtos.img` | Standart FAT32 disk imajı |

            ### 📱 Limbo PC Emulator Kurulum

            1. [Limbo PC Emulator](https://github.com/limboemu/limbo)'yi Android'e kur
            2. `MTOS-Limbo.zip`'i indir ve aç
            3. Limbo'yu aç ve şu ayarları yap:

            ```
            Architecture  : x86
            CPU           : qemu32
            RAM           : 256 MB
            Hard Disk A   : mtos-limbo.img
            Kernel        : bzImage
            Initrd        : initrd.img
            Kernel cmdline: console=ttyS0 quiet
            Display       : None (VNC veya console)
            ```

            4. ▶ Play!

            ### 💻 QEMU ile (PC)
            ```bash
            qemu-system-x86_64 \
              -kernel bzImage \
              -initrd initrd.img \
              -append "console=ttyS0 quiet" \
              -nographic -m 256M
            ```

            ### 🎮 Komutlar
            `ls` `cd` `mkdir` `rm` `writef` `edfile` `lua` `games` `help`

          files: |
            ./release-files/mtos-limbo-zip/MTOS-Limbo.zip
            ./release-files/mtos-limbo-img/mtos-limbo.img
            ./release-files/mtos-bzImage/bzImage
            ./release-files/mtos-initrd/initrd.img
            ./release-files/mtos-img/mtos.img
          draft: false
          prerelease: false
          
